name: Images pipeline
on:
  pull_request:
    paths: ["proxmox/terraform/images/**"]
  push:
    branches: [main]
    paths: ["proxmox/terraform/images/**"]

jobs:
  terraform-plan:
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, homelab]
    defaults:
      run:
        working-directory: proxmox/terraform/images
    steps:
      - uses: actions/checkout@v4
      - run: terraform init
      - run: terraform plan -no-color
        env:
          TF_VAR_PROXMOX_ENDPOINT: ${{ secrets.PROXMOX_ENDPOINT }}
          TF_VAR_PROXMOX_API_TOKEN: ${{ secrets.PROXMOX_API_TOKEN }}
          TF_VAR_PUBLIC_SSH_KEY: ${{ secrets.PUBLIC_SSH_KEY }}
  
  terraform-apply:
    if: github.event_name == 'push'
    runs-on: [self-hosted, homelab]
    environment: production
    defaults:
      run:
        working-directory: proxmox/terraform/images
    outputs:
      inventory_ready: ${{ steps.gen_inventory.outcome }}
    steps:
      - uses: actions/checkout@v4
      - run: terraform init
      - run: terraform apply -auto-approve
        env:
          TF_VAR_PROXMOX_ENDPOINT: ${{ secrets.PROXMOX_ENDPOINT }}
          TF_VAR_PROXMOX_API_TOKEN: ${{ secrets.PROXMOX_API_TOKEN }}
          TF_VAR_PUBLIC_SSH_KEY: ${{ secrets.PUBLIC_SSH_KEY }}
      - id: gen_inventory
        run: terraform output -json > ../ansible/inventory/tf_output.json