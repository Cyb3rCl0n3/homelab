name: Infra pipeline
on:
  pull_request:
    paths: ["proxmox/terraform/**"]
  push:
    branches: [main]
    paths: ["proxmox/terraform/**", "proxmox/ansible/**", ".github/workflows/**"]

jobs:
  terraform-scan:
    runs-on: [self-hosted, homelab]
    permissions:
      contents: read
      checks: write
      pull-requests: write
    defaults:
      run:
        working-directory: proxmox/terraform
    steps:
      - uses: actions/checkout@v4

      - name: Terraform init
        run: terraform init -backend=false -input=false

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      # - name: Tflint scan
      #   run: |
      #     docker run --rm \
      #       -v "$(pwd):/data" \
      #       -w /data \
      #       --user "$(id -u):$(id -g)" \
      #       -e TFLINT_PLUGIN_DIR=/data/.tflint.d \
      #       --entrypoint sh \
      #       ghcr.io/terraform-linters/tflint:latest \
      #       -c 'tflint --init && tflint --format junit > tflint_results_junit.xml'

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: proxmox/terraform
          trivy-config: proxmox/terraform/.trivy.yaml
          format: template
          template: '@/contrib/junit.tpl'
          output: proxmox/terraform/trivy_results_junit.xml

      - name: Checkov scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: proxmox/terraform
          config_file: proxmox/terraform/.checkov.yaml
          output_format: cli,junitxml
          output_file_path: console,proxmox/terraform/checkov_results_junit.xml

      - name: Publish scan results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: success() || failure()
        with:
          check_name: Terraform scan results
          files: proxmox/terraform/*_junit.xml
          action_fail: true

  terraform-plan:
    if: github.event_name == 'pull_request'
    needs: terraform-scan
    runs-on: [self-hosted, homelab]
    defaults:
      run:
        working-directory: proxmox/terraform
    steps:
      - uses: actions/checkout@v4
      - run: terraform init
      - run: terraform plan -no-color
        env:
          TF_VAR_PROXMOX_ENDPOINT: ${{ secrets.PROXMOX_ENDPOINT }}
          TF_VAR_PROXMOX_API_TOKEN: ${{ secrets.PROXMOX_API_TOKEN }}
          TF_VAR_PUBLIC_SSH_KEY: ${{ secrets.PUBLIC_SSH_KEY }}

  terraform-apply:
    if: github.event_name == 'push'
    needs: terraform-scan
    runs-on: [self-hosted, homelab]
    environment: production
    defaults:
      run:
        working-directory: proxmox/terraform
    outputs:
      inventory_ready: ${{ steps.gen_inventory.outcome }}
    steps:
      - uses: actions/checkout@v4
      - run: terraform init
      - run: terraform apply -auto-approve
        env:
          TF_VAR_PROXMOX_ENDPOINT: ${{ secrets.PROXMOX_ENDPOINT }}
          TF_VAR_PROXMOX_API_TOKEN: ${{ secrets.PROXMOX_API_TOKEN }}
          TF_VAR_PUBLIC_SSH_KEY: ${{ secrets.PUBLIC_SSH_KEY }}
      - id: gen_inventory
        run: terraform output -json > ../ansible/inventory/tf_output.json

  ansible-run:
    needs: terraform-apply
    runs-on: [self-hosted, homelab]
    defaults:
      run:
        working-directory: proxmox/ansible
    steps:
      - uses: actions/checkout@v4
      - name: Write SSH key
        run: |
          echo "${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}" | base64 -d > /tmp/homelab_ansible
          chmod 600 /tmp/homelab_ansible
      - name: Run ansible playbook
        run: |
          ansible-playbook \
           -i inventory/generated.ini \
           --private-key /tmp/homelab_ansible \
           playbooks/site.yml
      - name: Cleanup SSH key
        if: always()
        run: rm -f /tmp/homelab_ansible