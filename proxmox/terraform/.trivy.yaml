# Trivy config for filesystem scan of the Terraform root module.
# https://trivy.dev/latest/docs/references/configuration/config-file/
scan:
  scanners:
    - misconfig
    - secret

severity:
  - HIGH
  - CRITICAL

# Local homelab state files must never be scanned or committed.
skip-files:
  - "**/*.tfstate"
  - "**/*.tfstate.backup"

misconfiguration:
  terraform:
    exclude-downloaded-modules: true

# Fail the step when a finding at the configured severity is present.
exit-code: 1
