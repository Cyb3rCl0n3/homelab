# cloud-init wait + apt upgrade are handled by the `common` role (runs on all hosts).

- name: Install prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

# AdGuard binds :53. On Ubuntu, systemd-resolved's stub listener also holds :53,
# so free it and let resolved keep resolving via its upstreams for the host itself.
- name: Ensure systemd-resolved drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/resolved.conf.d
    state: directory
    mode: "0755"

- name: Disable systemd-resolved stub listener (frees port 53 for AdGuard)
  ansible.builtin.copy:
    dest: /etc/systemd/resolved.conf.d/adguard.conf
    content: |
      [Resolve]
      DNSStubListener=no
    mode: "0644"
  notify: Restart systemd-resolved

- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    filename: docker
    state: present

- name: Install Docker Engine and Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Start/enable docker
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started

- name: Create directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ docker_dir }}"
    - "{{ docker_dir }}/caddy"
    - "{{ docker_dir }}/adguard/conf"

- name: Template docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ docker_dir }}/docker-compose.yml"
    mode: "0644"

- name: Template Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "{{ docker_dir }}/caddy/Caddyfile"
    mode: "0644"

# Pre-seeded so AdGuard skips the first-run web wizard — declarative, not clicked in.
# The password_hash('bcrypt') filter runs on the control node, which needs passlib.
- name: Template AdGuard Home config
  ansible.builtin.template:
    src: AdGuardHome.yaml.j2
    dest: "{{ docker_dir }}/adguard/conf/AdGuardHome.yaml"
    mode: "0600"
  register: adguard_conf

- name: Deploy the stack
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ docker_dir }}"
  register: compose_up
  changed_when: "'Started' in compose_up.stderr or 'Created' in compose_up.stderr or 'Recreated' in compose_up.stderr"

- name: Restart AdGuard if only its config changed
  ansible.builtin.command:
    cmd: docker compose restart adguardhome
    chdir: "{{ docker_dir }}"
  when: adguard_conf.changed and not compose_up.changed
  changed_when: true
