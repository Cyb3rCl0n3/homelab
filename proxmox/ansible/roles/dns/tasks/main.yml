- name: Install BIND9
  ansible.builtin.apt:
    name: "{{ dns_packages }}"
    update_cache: true

- name: Ensure zone directory exists
  ansible.builtin.file:
    path: "{{ zones_dir }}"
    state: directory
    owner: bind
    group: bind
    mode: "0755"

- name: Configure BIND options
  ansible.builtin.template:
    src: named.conf.options.j2
    dest: "{{ named_conf_options_path }}"
    owner: root
    group: bind
    mode: "0644"
  notify: Restart bind9

- name: Configure local zone (master)
  ansible.builtin.template:
    src: named.conf.local.j2
    dest: "{{ named_conf_local_path }}"
    owner: root
    group: bind
    mode: "0644"
  notify: Restart bind9

- name: Create zone file
  ansible.builtin.template:
    src: zone.db.j2
    dest: "{{ zone_file }}"
    owner: bind
    group: bind
    mode: "0644"
  notify: Restart bind9

- name: Validate config
  ansible.builtin.command: named-checkconf
  changed_when: false

- name: Start/enable bind9
  ansible.builtin.service:
    name: bind9
    enabled: true
    state: started
