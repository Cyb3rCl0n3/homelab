- hosts: all
  gather_facts: false
  vars_files:
    - ../group_vars/all/vault.yml
  tasks:
    - name: Wait for cloud-init to finish
      ansible.builtin.raw: cloud-init status --wait
      register: cloud_init_result
      changed_when: false
      failed_when: cloud_init_result.rc not in [0, 2]

    - name: Gather facts now that the host is ready
      ansible.builtin.setup:

- hosts: all
  become: true
  vars_files:
    - ../group_vars/all/vault.yml
  tasks:
    - name: Ensure the target user exists
      ansible.builtin.user:
        name: "{{ target_user }}"
        shell: /bin/bash
        groups: sudo
        append: true
        create_home: true
        state: present
        password: "{{ target_password | password_hash('sha512') }}"
        update_password: always

    - name: Add SSH public key for the target user
      ansible.posix.authorized_key:
        user: "{{ target_user }}"
        key: "{{ ssh_public_key }}"
        state: present

    - name: Update and upgrade packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist

    - name: Install a test package
      ansible.builtin.apt:
        name: screenfetch
        update_cache: true